# Build and test the workspace on every native OS.
#
# Ensures the Windows (windows-sys/ToUnicodeEx) and macOS (Carbon/UCKeyTranslate) code compiles
# on their native runners even though the Linux host can't validate it. Linux additionally runs
# the full test suite against the generated database.

name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build-test:
    name: Build & test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Install libxkbcommon (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libxkbcommon-dev pkg-config

      - name: Check formatting
        run: cargo fmt --all -- --check
        continue-on-error: true

      - name: Build
        run: cargo build --workspace

      - name: Test
        run: cargo test --workspace

      - name: Clippy
        run: cargo clippy --workspace -- -D warnings
        continue-on-error: true