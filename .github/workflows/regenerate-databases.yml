# Regenerate the platform layout databases on native runners.
#
# Triggered manually (workflow_dispatch). Runs the extractor on each native OS runner, collects
# the generated JSON, and opens a pull request with the updated database.
#
# On Linux:   reads evdev.lst from the system xkeyboard-config and extracts every XKB layout.
# On Windows: enumerates installed keyboard layouts via GetKeyboardLayoutList.
# On macOS:   enumerates installed keyboard layouts via TISCreateInputSourceList.
#
# The three runners run in parallel; the PR collector waits for all of them.

name: Regenerate layout databases

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  extract:
    name: Extract (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            artifact: db-linux
          - os: windows-latest
            platform: windows
            artifact: db-windows
          - os: macos-latest
            platform: macos
            artifact: db-macos
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install libxkbcommon (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libxkbcommon-dev pkg-config

      - name: Build extractor
        run: cargo build --release -p omni-keymap-extract

      - name: Run extraction
        run: |
          ./target/release/omni-keymap-extract --platform ${{ matrix.platform }} --all --out-dir database/${{ matrix.platform }}

      - name: Upload database artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: database/${{ matrix.platform }}/
          if-no-files-found: warn

  pr:
    name: Open regeneration PR
    needs: extract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Download all database artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Merge artifacts into database/
        run: |
          mkdir -p database/linux database/windows database/macos
          # Each artifact is a directory matching the artifact name containing the JSON files.
          rsync -a artifacts/db-linux/   database/linux/
          rsync -a artifacts/db-windows/ database/windows/
          rsync -a artifacts/db-macos/   database/macos/
          # Preserve empty platform dirs with .gitkeep.
          for d in android; do touch database/$d/.gitkeep; done

      - name: Build documentation (mdBook)
        run: |
          cargo install mdbook --locked --version 0.4.52
          mdbook build docs

      - name: Create pull request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: regenerate layout databases (linux/windows/macos)"
          branch: regenerate-databases
          delete-branch: true
          title: "Regenerate layout databases"
          body: |
            Automated regeneration of the platform layout databases.

            Generated by the `Regenerate layout databases` workflow
            ([run #${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})).

            - Linux: extracted via `--platform linux --all` (evdev.lst / xkbcommon)
            - Windows: extracted via `--platform windows --all` (GetKeyboardLayoutList / ToUnicodeEx)
            - macOS: extracted via `--platform macos --all` (TISCreateInputSourceList / UCKeyTranslate)
          labels: database, automated